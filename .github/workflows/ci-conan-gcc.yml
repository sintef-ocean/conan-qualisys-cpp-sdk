---
name: Linux GCC

on: [push, workflow_dispatch]

env:
  CONAN_UPLOAD: ${{ secrets.CONAN_URL }}
  CONAN_PASSWORD_SINTEF: ${{ secrets.CONAN_PASSWORD }}
  CONAN_LOGIN_USERNAME_SINTEF: ${{ secrets.CONAN_USER }}
  CONFIG_URL: https://github.com/sintef-ocean/conan-configs.git
  DEBIAN_FRONTEND: noninteractive
  TZ: Etc/UTC
jobs:
  conan-with-gcc:
    name: Conan
    runs-on: ubuntu-24.04
    env:
      PKG_REFERENCE: >-
        ${{ format('--version {0} --user {1} --channel {2}', matrix.version, 'sintef', matrix.channel) }}
    strategy:
      fail-fast: false
      matrix:
        profile: [gcc]
        compiler_version: [12, 14]
        version: [1.23.0]
        build_type: [Debug, Release]
        channel: ["${{ (github.head_ref || github.ref_name) == 'main' && 'stable' || 'testing' }}"]
        include:
          - linux: debian:latest
          -
            linux: debian:bookworm
            compiler_version: 12
          -
            linux: debian:trixie
            compiler_version: 14
    container:
      image: ${{ matrix.linux }}
      options: -u 0
    steps:
      - uses: actions/checkout@v6
      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y jq pipx build-essential cmake git
          pipx install conan
          echo "/github/home/.local/bin" >> $GITHUB_PATH
      - name: Conan configs
        run: |
          conan remote add sintef ${{ env.CONAN_UPLOAD }}
          echo "package_name=$(conan inspect -f json . | jq .name -r)" >> $GITHUB_ENV
          git config --global --add safe.directory '*'
          conan config install ${{ env.CONFIG_URL }}  --type git -sf conan2.0
          conan config install ${{ env.CONFIG_URL }}  --type git -sf profiles -tf profiles
      - name: Conan create
        run: |
          conan create -s:h build_type=${{ matrix.build_type }} \
            -s:b build_type=${{ matrix.build_type }} \
            -s:h compiler.version=${{ matrix.compiler_version }} \
            -s:b compiler.version=${{ matrix.compiler_version }} \
            -pr:b=${{ matrix.profile }} -pr:h=${{ matrix.profile }} \
            -b missing -b outdated -b '${{ env.package_name }}*' \
            ${{ env.PKG_REFERENCE }} \
            .
      - name: Conan upload
        run: |
          conan upload --confirm -r sintef '${{ env.package_name }}*'
